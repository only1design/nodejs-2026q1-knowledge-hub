name: knowledge-hub

services:
  app:
    build:
      context: .
      args:
        PORT: ${PORT}
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      db:
        condition: service_healthy
      vectordb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:${PORT}/" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure:5
    networks:
      - db-network
      - vectordb-network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    user: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    expose:
      - ${POSTGRES_PORT}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 3s
    networks:
      - db-network

  vectordb:
    image: qdrant/qdrant:v1.17.1
    restart: unless-stopped
    expose:
      - "6333"
    ports:
      - "6333:6333"
    volumes:
      - vectordb_data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 3s
    networks:
      - vectordb-network

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    networks:
      - db-network
    profiles:
      - debug

volumes:
 db-data:
 vectordb_data:

networks:
  db-network:
    driver: bridge
  vectordb-network:
    driver: bridge
