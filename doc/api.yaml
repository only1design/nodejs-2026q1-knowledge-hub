openapi: 3.0.0
info:
  title: Knowledge Hub
  description: Knowledge hub service for managing articles, categories, and comments
  version: 1.0.0

servers:
  - url: ""

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        login:
          type: string
          example: 'TestUser'
        role:
          type: string
          enum: [admin, editor, viewer]
          example: 'viewer'
        createdAt:
          type: number
          example: 1655000000
        updatedAt:
          type: number
          example: 1655000000
      required:
        - id
        - login
        - role
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: 'Technology'
        description:
          type: string
          example: 'Articles about technology'
      required:
        - id
        - name
        - description
    Article:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: 'Introduction to NestJS'
        content:
          type: string
          example: 'NestJS is a framework for building efficient server-side applications.'
        status:
          type: string
          enum: [draft, published, archived]
          example: 'draft'
        authorId:
          type: string
          format: uuid
          nullable: true
        categoryId:
          type: string
          format: uuid
          nullable: true
        tags:
          type: array
          items:
            type: string
          example: ['nodejs', 'typescript']
        createdAt:
          type: number
          example: 1655000000
        updatedAt:
          type: number
          example: 1655000000
      required:
        - id
        - title
        - content
    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
          example: 'Great article!'
        articleId:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: number
          example: 1655000000
      required:
        - id
        - content
        - articleId
  responses:
    UnauthorizedError:
      description: Access token is missing or invalid
    ForbiddenError:
      description: Insufficient permissions for this operation
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /auth/signup:
    post:
      tags:
        - Auth
      security: []
      summary: Signup
      description: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                  description: Username
                password:
                  type: string
                  description: Password
              required:
                - login
                - password
      responses:
        201:
          description: Successful signup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        400:
          description: Bad request
  /auth/login:
    post:
      tags:
        - Auth
      security: []
      summary: Login
      description: Login and receive JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                  description: Username
                password:
                  type: string
                  description: Password
              required:
                - login
                - password
      responses:
        200:
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        403:
          description: Incorrect login or password
  /auth/refresh:
    post:
      tags:
        - Auth
      security: []
      summary: Refresh tokens
      description: Get new access and refresh tokens using a valid refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required:
                - refreshToken
      responses:
        200:
          description: New token pair
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        401:
          description: No refresh token provided
        403:
          description: Invalid or expired refresh token
  /user:
    get:
      tags:
        - Users
      summary: Get all users
      description: Gets all users
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        401:
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags:
        - Users
      summary: Create user
      description: Creates a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, editor, viewer]
              required:
                - login
                - password
      responses:
        201:
          description: The user has been created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        400:
          description: Bad request. body does not contain required fields
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
  /user/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - Users
      summary: Get single user by id
      description: Get single user by id
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        400:
          description: Bad request. userId is invalid (not uuid)
        401:
          $ref: '#/components/responses/UnauthorizedError'
        404:
          description: User not found
    put:
      tags:
        - Users
      summary: Update a user's password
      description: Updates a user's password by ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
              required:
                - oldPassword
                - newPassword
      responses:
        200:
          description: The user has been updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        400:
          description: Bad request. userId is invalid (not uuid)
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          description: oldPassword is wrong or insufficient permissions
        404:
          description: User not found
    delete:
      tags:
        - Users
      summary: Delete user
      description: Deletes user by ID. Sets authorId to null on articles, deletes user's comments.
      responses:
        204:
          description: The user has been deleted
        400:
          description: Bad request. userId is invalid (not uuid)
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          description: User not found
  /category:
    get:
      tags:
        - Category
      summary: Get all categories
      description: Gets all categories
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        401:
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags:
        - Category
      summary: Add new category
      description: Add new category (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
              required:
                - name
                - description
      responses:
        201:
          description: Category is created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        400:
          description: Bad request. body does not contain required fields
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
  /category/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - Category
      summary: Get single category by id
      description: Gets single category by id
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        400:
          description: Bad request. categoryId is invalid (not uuid)
        401:
          $ref: '#/components/responses/UnauthorizedError'
        404:
          description: Category was not found
    put:
      tags:
        - Category
      summary: Update category information
      description: Update category information by UUID (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
              required:
                - name
                - description
      responses:
        200:
          description: The category has been updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        400:
          description: Bad request. categoryId is invalid (not uuid)
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          description: Category was not found
    delete:
      tags:
        - Category
      summary: Delete category
      description: Delete category. Sets categoryId to null on associated articles.
      responses:
        204:
          description: Deleted successfully
        400:
          description: Bad request. categoryId is invalid (not uuid)
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          description: Category was not found
  /article:
    get:
      tags:
        - Article
      summary: Get articles list
      description: Gets all articles. Supports filtering by status, categoryId, and tag.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published, archived]
          description: Filter by article status
        - name: categoryId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by category ID
        - name: tag
          in: query
          schema:
            type: string
          description: Filter by tag name (can be repeated for multiple tags)
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Article'
        401:
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags:
        - Article
      summary: Add new article
      description: Add new article (editor can create own, admin can create any)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                status:
                  type: string
                  enum: [draft, published, archived]
                authorId:
                  type: string
                  format: uuid
                  nullable: true
                categoryId:
                  type: string
                  format: uuid
                  nullable: true
                tags:
                  type: array
                  items:
                    type: string
              required:
                - title
                - content
      responses:
        201:
          description: Article is created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        400:
          description: Bad request. body does not contain required fields
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
  /article/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - Article
      summary: Get single article by id
      description: Gets single article by id
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        400:
          description: Bad request. articleId is invalid (not uuid)
        401:
          $ref: '#/components/responses/UnauthorizedError'
        404:
          description: Article was not found
    put:
      tags:
        - Article
      summary: Update article information
      description: Update article by UUID (editor can update own, admin can update any)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                status:
                  type: string
                  enum: [draft, published, archived]
                categoryId:
                  type: string
                  format: uuid
                  nullable: true
                tags:
                  type: array
                  items:
                    type: string
      responses:
        200:
          description: The article has been updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        400:
          description: Bad request. articleId is invalid (not uuid)
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          description: Article was not found
    delete:
      tags:
        - Article
      summary: Delete article
      description: Delete article. Deletes all associated comments. (admin only)
      responses:
        204:
          description: Deleted successfully
        400:
          description: Bad request. articleId is invalid (not uuid)
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          description: Article was not found
  /comment:
    get:
      tags:
        - Comment
      summary: Get comments for an article
      description: Gets all comments for a specific article. Requires articleId query parameter.
      parameters:
        - name: articleId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Article ID to get comments for
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        401:
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags:
        - Comment
      summary: Add new comment
      description: Add a comment to an article (editor can create own, admin can create any)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                articleId:
                  type: string
                  format: uuid
                authorId:
                  type: string
                  format: uuid
                  nullable: true
              required:
                - content
                - articleId
      responses:
        201:
          description: Comment is created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        400:
          description: Bad request. body does not contain required fields
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        422:
          description: Article with given articleId doesn't exist
  /comment/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - Comment
      summary: Get single comment by id
      description: Gets single comment by id
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        400:
          description: Bad request. commentId is invalid (not uuid)
        401:
          $ref: '#/components/responses/UnauthorizedError'
        404:
          description: Comment was not found
    delete:
      tags:
        - Comment
      summary: Delete comment
      description: Delete comment (admin can delete any, editor can delete own)
      responses:
        204:
          description: Deleted successfully
        400:
          description: Bad request. commentId is invalid (not uuid)
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          description: Comment was not found
  /ai/articles/{articleId}/summarize:
    parameters:
      - name: articleId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags:
        - AI
      summary: Summarize article
      description: Generates a summary for an existing article using AI
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxLength:
                  type: string
                  enum: [short, medium, detailed]
                  default: medium
      responses:
        200:
          description: Summary generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  articleId:
                    type: string
                    format: uuid
                  summary:
                    type: string
                  originalLength:
                    type: number
                  summaryLength:
                    type: number
        401:
          $ref: '#/components/responses/UnauthorizedError'
        404:
          description: Article not found
        429:
          description: Rate limit exceeded
        503:
          description: AI service temporarily unavailable
  /ai/articles/{articleId}/translate:
    parameters:
      - name: articleId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags:
        - AI
      summary: Translate article
      description: Translates article content to the specified language using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetLanguage:
                  type: string
                sourceLanguage:
                  type: string
              required:
                - targetLanguage
      responses:
        200:
          description: Translation completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  articleId:
                    type: string
                    format: uuid
                  translatedText:
                    type: string
                  detectedLanguage:
                    type: string
        400:
          description: Bad request. targetLanguage is missing
        401:
          $ref: '#/components/responses/UnauthorizedError'
        404:
          description: Article not found
        429:
          description: Rate limit exceeded
        503:
          description: AI service temporarily unavailable
  /ai/articles/{articleId}/analyze:
    parameters:
      - name: articleId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags:
        - AI
      summary: Analyze article content
      description: Analyzes article text and returns review insights using AI
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                task:
                  type: string
                  enum: [review, bugs, optimize, explain]
                  default: review
      responses:
        200:
          description: Analysis completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  articleId:
                    type: string
                    format: uuid
                  analysis:
                    type: string
                  suggestions:
                    type: array
                    items:
                      type: string
                  severity:
                    type: string
                    enum: [info, warning, error]
        401:
          $ref: '#/components/responses/UnauthorizedError'
        404:
          description: Article not found
        429:
          description: Rate limit exceeded
        503:
          description: AI service temporarily unavailable

  /ai/usage:
    get:
      tags:
        - AI
      summary: Get AI usage statistics
      description: Returns request counts by endpoint and cumulative token usage since service startup
      responses:
        200:
          description: Usage statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  usage:
                    type: object
                    description: Request counts by endpoint
                    additionalProperties:
                      type: integer
                    example:
                      summarizeArticle: 3
                      translateArticle: 1
                  totalRequests:
                    type: integer
                    example: 4
                  tokenUsage:
                    type: object
                    properties:
                      promptTokens:
                        type: integer
                        example: 1250
                      candidatesTokens:
                        type: integer
                        example: 430
                      totalTokens:
                        type: integer
                        example: 1680
        401:
          $ref: '#/components/responses/UnauthorizedError'

  /ai/generate:
    post:
      tags:
        - AI
      summary: Generate free-form AI response
      description: Sends a custom prompt to the AI model and returns the generated text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prompt
              properties:
                prompt:
                  type: string
                  example: 'Explain quantum computing in simple terms'
      responses:
        200:
          description: Generated response
          content:
            application/json:
              schema:
                type: string
        400:
          description: Validation error (prompt is empty or missing)
        401:
          $ref: '#/components/responses/UnauthorizedError'
        429:
          description: Rate limit exceeded
        503:
          description: AI service temporarily unavailable

  /ai/rag/index:
    post:
      tags:
        - RAG
      summary: Index Knowledge Hub articles
      description: Builds or refreshes the vector index using articles from the database
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                onlyPublished:
                  type: boolean
                  default: true
                articleIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Optional selective reindex by article IDs
      responses:
        200:
          description: Indexing result
          content:
            application/json:
              schema:
                type: object
                properties:
                  indexedArticles:
                    type: integer
                    example: 12
                  indexedChunks:
                    type: integer
                    example: 47
                  vectorCollection:
                    type: string
                    example: knowledge_hub_articles
        503:
          description: Vector DB or AI service unavailable

  /ai/rag/search:
    post:
      tags:
        - RAG
      summary: Semantic search in Knowledge Hub
      description: Embeds the query and retrieves the most relevant article chunks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  example: How does caching work in NestJS?
                limit:
                  type: integer
                  minimum: 1
                  maximum: 20
                  default: 5
                articleStatus:
                  type: string
                  enum: [draft, published, archived]
                categoryId:
                  type: string
                  format: uuid
                tags:
                  type: array
                  items:
                    type: string
      responses:
        200:
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        articleId:
                          type: string
                          format: uuid
                        articleTitle:
                          type: string
                        chunk:
                          type: string
                        similarity:
                          type: number
                          format: float
                          example: 0.87
        400:
          description: query is missing
        503:
          description: Vector DB or AI service unavailable

  /ai/rag/chat:
    post:
      tags:
        - RAG
      summary: Chat with Knowledge Hub RAG
      description: Answers a question grounded in indexed article content with source attribution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - question
              properties:
                question:
                  type: string
                  example: What are the best practices for NestJS error handling?
                conversationId:
                  type: string
                  format: uuid
                  description: Omit to start a new conversation
      responses:
        200:
          description: Grounded answer with sources
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        articleId:
                          type: string
                          format: uuid
                        articleTitle:
                          type: string
                        relevantChunk:
                          type: string
                  conversationId:
                    type: string
                    format: uuid
        400:
          description: question is missing
        503:
          description: Vector DB or AI service unavailable

  /ai/rag/index/articles/{articleId}:
    delete:
      tags:
        - RAG
      summary: Delete article from vector index
      description: Removes all vector entries linked to the given article
      parameters:
        - name: articleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        204:
          description: Vectors removed successfully
        404:
          description: Article not found in vector index

  /ai/rag/chat/{conversationId}/history:
    get:
      tags:
        - RAG
      summary: Get RAG conversation history
      description: Returns stored messages for the given conversation ID
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Conversation history
          content:
            application/json:
              schema:
